services:
  pystreamasr:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PROJECT_NAME: PyStreamASR
      MYSQL_DATABASE_URL: mysql+aiomysql://pystreamasr:pystreamasr@mysql:3306/pystreamasr
      MODEL_PATH: /app/models/sherpa-onnx-streaming-paraformer-bilingual-zh-en
      LOG_LEVEL: INFO
      LOG_DIR: logs
      RETURN_TRANSCRIPTION: "true"
      AUDIO_INPUT_FORMAT: alaw
      AUDIO_SOURCE_RATE: "8000"
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      APP_WORKERS: "1"
      ASR_INFERENCE_WORKERS: "2"
      ASR_INFERENCE_QUEUE_SIZE: "8"
      ASR_INFERENCE_QUEUE_TIMEOUT_SECONDS: "20.0"
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  mysql:
    image: mysql:8.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: pystreamasr
      MYSQL_USER: pystreamasr
      MYSQL_PASSWORD: pystreamasr
      MYSQL_ROOT_PASSWORD: pystreamasr-root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -upystreamasr -ppystreamasr --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  model-downloader:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "scripts/download_models.py"]
    profiles:
      - setup
    volumes:
      - ./models:/app/models

volumes:
  mysql-data:
